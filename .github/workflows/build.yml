name: Build MLB Scores ACAP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ACAP using Axis Native SDK
        run: |
          cd v1.0.26
          docker build \
            --build-arg ARCH=aarch64 \
            --tag mlb_scores:1.0 \
            .

      - name: Extract .eap from Docker image
        run: |
          mkdir -p build
          docker cp $(docker create mlb_scores:1.0):/opt/app/. build/
          ls -lh build/*.eap

      - name: Upload .eap as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb_scores_aarch64
          path: build/*.eap
          retention-days: 30
